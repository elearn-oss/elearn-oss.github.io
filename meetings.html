<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جلسات من | سامانه ایلرن</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ---- Page Loader ---- */
        #page-loader {
            position: fixed; inset: 0;
            background: var(--bg-body);
            display: none; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        #page-loader.active { display: flex; }

        .loader-spinner {
            width: 44px; height: 44px;
            border: 3px solid var(--border-color);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        /* ---- Navbar ---- */
        .navbar {
            position: fixed; top: 0; right: 0; left: 0;
            height: var(--navbar-height);
            z-index: 1030;
            display: flex; align-items: center;
            padding: 0 var(--space-5);
            background: var(--bg-navbar);
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
        }

        .navbar-right,
        .navbar-left { display: flex; align-items: center; gap: var(--space-3); }
        .navbar-right { flex: 1; }

        .navbar-logo {
            font-weight: 800; font-size: var(--font-size-xl);
            color: var(--color-primary);
            margin-right: var(--space-3);
        }

        .hamburger {
            display: none; background: none; border: none;
            color: var(--text-secondary); font-size: 1.5rem;
            cursor: pointer; padding: var(--space-1);
            border-radius: var(--border-radius-sm);
            transition: background var(--transition-fast);
        }
        .hamburger:hover { background: var(--bg-hover); }

        .navbar-menu { display: flex; align-items: center; gap: var(--space-2); }

        .nav-icon-btn {
            position: relative;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--border-radius);
            background: none; border: none;
            color: var(--text-secondary); font-size: 1.25rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .nav-icon-btn:hover { background: var(--bg-hover); color: var(--color-primary); }

        .nav-badge {
            position: absolute; top: 2px; left: 2px;
            min-width: 18px; height: 18px; padding: 0 5px;
            font-size: 0.65rem; font-weight: 700;
            background: var(--color-danger); color: #fff;
            border-radius: var(--border-radius-full);
            display: none; align-items: center; justify-content: center;
            line-height: 1;
        }
        .nav-badge.visible { display: flex; }

        .user-avatar {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-accent));
            color: #fff; font-weight: 700; font-size: var(--font-size-sm);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }

        #nav-username {
            font-weight: 600; font-size: var(--font-size-sm);
            color: var(--text-primary);
            white-space: nowrap;
        }

        .btn-logout {
            background: none; border: none;
            color: var(--text-muted); font-size: 1.2rem;
            cursor: pointer; padding: var(--space-1);
            border-radius: var(--border-radius-sm);
            transition: color var(--transition-fast);
        }
        .btn-logout:hover { color: var(--color-danger); }

        /* ---- Notification Dropdown ---- */
        .notification-dropdown {
            position: absolute; top: calc(100% + 8px); left: 0;
            width: 340px; max-height: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-lg);
            overflow-y: auto;
            opacity: 0; visibility: hidden;
            transform: translateY(8px);
            transition: all var(--transition-fast);
            z-index: 1050;
        }
        .notification-dropdown.show {
            opacity: 1; visibility: visible; transform: translateY(0);
        }
        .notif-header {
            padding: var(--space-3) var(--space-4);
            font-weight: 700; font-size: var(--font-size-sm);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .notif-item {
            padding: var(--space-3) var(--space-4);
            font-size: var(--font-size-sm);
            border-bottom: 1px solid var(--border-color);
            color: var(--text-secondary);
            transition: background var(--transition-fast);
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-item:hover { background: var(--bg-hover); }
        .notif-empty {
            padding: var(--space-6) var(--space-4);
            text-align: center;
            color: var(--text-muted); font-size: var(--font-size-sm);
        }

        /* ---- Sidebar ---- */
        .sidebar {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: var(--sidebar-width);
            z-index: 1040;
            background: var(--bg-sidebar);
            border-left: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            transition: transform var(--transition-base);
        }

        .sidebar-header {
            display: flex; align-items: center;
            height: var(--navbar-height);
            padding: 0 var(--space-4);
            border-bottom: 1px solid var(--border-color);
        }
        .sidebar-header .logo-text {
            font-weight: 700; font-size: var(--font-size-lg);
            color: var(--color-primary);
        }

        .sidebar-nav {
            flex: 1; list-style: none;
            padding: var(--space-3) 0;
            overflow-y: auto;
        }
        .sidebar-nav li a {
            display: flex; align-items: center;
            gap: var(--space-3);
            padding: var(--space-2) var(--space-4);
            margin: 2px var(--space-2);
            border-radius: var(--border-radius);
            color: var(--text-secondary);
            font-size: var(--font-size-sm); font-weight: 500;
            transition: all var(--transition-fast);
        }
        .sidebar-nav li a:hover { background: var(--bg-hover); color: var(--color-primary); }
        .sidebar-nav li.active > a {
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            color: #fff;
            box-shadow: 0 4px 12px rgba(var(--color-primary-rgb), 0.30);
        }
        .sidebar-nav li a .icon { font-size: 1.25rem; flex-shrink: 0; width: 24px; text-align: center; }

        .sidebar-term-box {
            padding: var(--space-4);
            margin: var(--space-3);
            border-radius: var(--border-radius);
            background: rgba(var(--color-primary-rgb), 0.05);
            border: 1px solid rgba(var(--color-primary-rgb), 0.10);
            font-size: var(--font-size-xs);
            color: var(--text-secondary);
        }
        .sidebar-term-box .term-title {
            font-weight: 700; font-size: var(--font-size-sm);
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }
        .sidebar-term-box .term-row {
            display: flex; justify-content: space-between;
            padding: 2px 0;
        }

        /* ---- Main Content ---- */
        .main-content {
            margin-right: var(--sidebar-width);
            padding: var(--space-5);
            padding-top: calc(var(--navbar-height) + var(--space-5));
            min-height: 100vh;
            transition: margin-right var(--transition-base);
            animation: fadeIn 0.4s ease both;
        }

        .section-header {
            display: flex; align-items: center; gap: var(--space-3);
            margin-bottom: var(--space-5);
        }
        .section-title {
            font-size: var(--font-size-xl); font-weight: 800;
            color: var(--text-primary); margin: 0;
        }
        .count-badge {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 28px; height: 28px; padding: 0 8px;
            border-radius: var(--border-radius-full);
            background: rgba(var(--color-primary-rgb), 0.12);
            color: var(--color-primary);
            font-size: var(--font-size-xs); font-weight: 700;
        }

        /* ---- Stats Cards ---- */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-5);
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--space-4) var(--space-5);
            display: flex; align-items: center; gap: var(--space-4);
            transition: transform var(--transition-base), box-shadow var(--transition-base);
        }
        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-card-icon {
            width: 48px; height: 48px;
            border-radius: var(--border-radius);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; flex-shrink: 0;
        }
        .stat-card-icon.total { background: rgba(var(--color-primary-rgb), 0.12); }
        .stat-card-icon.present { background: rgba(6, 214, 160, 0.12); }
        .stat-card-icon.absent { background: rgba(239, 71, 111, 0.12); }

        .stat-card-info { display: flex; flex-direction: column; }
        .stat-card-value {
            font-size: var(--font-size-xl); font-weight: 800;
            color: var(--text-primary); line-height: 1.2;
        }
        .stat-card-label {
            font-size: var(--font-size-xs);
            color: var(--text-muted); font-weight: 500;
        }

        /* ---- Meetings Table ---- */
        .meetings-table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            overflow: hidden;
        }

        .meetings-table {
            width: 100%;
            border-collapse: collapse;
        }

        .meetings-table thead {
            background: rgba(var(--color-primary-rgb), 0.04);
        }

        .meetings-table th {
            padding: var(--space-3) var(--space-4);
            font-size: var(--font-size-xs);
            font-weight: 700;
            color: var(--text-secondary);
            text-align: right;
            white-space: nowrap;
            border-bottom: 2px solid var(--border-color);
        }

        .meetings-table td {
            padding: var(--space-3) var(--space-4);
            font-size: var(--font-size-sm);
            color: var(--text-primary);
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .meetings-table tbody tr {
            transition: background var(--transition-fast);
        }
        .meetings-table tbody tr:hover {
            background: var(--bg-hover);
        }
        .meetings-table tbody tr:last-child td {
            border-bottom: none;
        }

        .status-badge {
            display: inline-flex; align-items: center; gap: var(--space-1);
            padding: 2px 10px;
            border-radius: var(--border-radius-full);
            font-size: var(--font-size-xs); font-weight: 600;
            white-space: nowrap;
        }
        .status-badge.present {
            background: rgba(6, 214, 160, 0.12);
            color: #059669;
        }
        .status-badge.absent {
            background: rgba(239, 71, 111, 0.12);
            color: #dc2626;
        }

        .btn-join {
            display: inline-flex; align-items: center; gap: var(--space-1);
            padding: 6px 14px;
            border: none; border-radius: var(--border-radius);
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            color: #fff;
            font-size: var(--font-size-xs); font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .btn-join:hover {
            box-shadow: 0 4px 12px rgba(var(--color-primary-rgb), 0.35);
            transform: translateY(-1px);
        }
        .btn-join:disabled {
            opacity: 0.5; cursor: not-allowed;
            transform: none; box-shadow: none;
        }

        .btn-details {
            display: inline-flex; align-items: center; gap: var(--space-1);
            padding: 6px 14px;
            border: 1px solid var(--border-color); border-radius: var(--border-radius);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: var(--font-size-xs); font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
            white-space: nowrap;
        }
        .btn-details:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .actions-cell {
            display: flex; gap: var(--space-2); align-items: center;
        }

        /* ---- Pagination ---- */
        .pagination-wrapper {
            display: flex; align-items: center; justify-content: center;
            gap: var(--space-2);
            padding: var(--space-4);
            border-top: 1px solid var(--border-color);
        }

        .pagination-btn {
            min-width: 36px; height: 36px;
            display: inline-flex; align-items: center; justify-content: center;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-size: var(--font-size-sm); font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .pagination-btn:hover:not(:disabled):not(.active) {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }
        .pagination-btn.active {
            background: var(--color-primary);
            border-color: var(--color-primary);
            color: #fff;
        }
        .pagination-btn:disabled {
            opacity: 0.4; cursor: not-allowed;
        }

        /* ---- Empty State ---- */
        .empty-state {
            text-align: center;
            padding: var(--space-8);
            color: var(--text-muted);
        }
        .empty-state .empty-icon { font-size: 3rem; margin-bottom: var(--space-3); }

        /* ---- Loading Skeleton ---- */
        .skeleton-row td {
            position: relative; overflow: hidden;
        }
        .skeleton-bar {
            height: 14px;
            border-radius: var(--border-radius-sm);
            background: var(--border-color);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* ---- Sidebar Overlay ---- */
        .sidebar-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 1035;
            transition: opacity var(--transition-base);
        }
        .sidebar-overlay.active { display: block; }

        /* ---- Responsive ---- */
        @media (max-width: 991.98px) {
            .hamburger { display: flex; }
            .sidebar { transform: translateX(100%); }
            .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-xl); }
            .main-content { margin-right: 0; }
            .navbar { right: 0; }
            #nav-username { display: none; }
        }
        @media (max-width: 767.98px) {
            .meetings-table thead { display: none; }
            .meetings-table, .meetings-table tbody, .meetings-table tr, .meetings-table td {
                display: block;
            }
            .meetings-table tr {
                margin-bottom: var(--space-3);
                border: 1px solid var(--border-color);
                border-radius: var(--border-radius);
                padding: var(--space-3);
                background: var(--bg-card);
            }
            .meetings-table td {
                display: flex; justify-content: space-between; align-items: center;
                padding: var(--space-2) var(--space-3);
                border-bottom: 1px solid var(--border-color);
            }
            .meetings-table td:last-child { border-bottom: none; }
            .meetings-table td::before {
                content: attr(data-label);
                font-weight: 700; font-size: var(--font-size-xs);
                color: var(--text-muted);
                margin-left: var(--space-3);
                flex-shrink: 0;
            }
            .actions-cell { justify-content: flex-end; }
        }
        @media (max-width: 575.98px) {
            .stats-row { grid-template-columns: 1fr; }
            .notification-dropdown { width: calc(100vw - 2rem); left: auto; right: 0; }
        }
    </style>
</head>
<body>
    <div id="page-loader" class="active"><div class="loader-spinner"></div></div>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-right">
            <button class="hamburger" id="hamburger-btn" aria-label="منو"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
            <span class="navbar-logo">ایلرن</span>
        </div>
        <div class="navbar-menu">
            <div style="position:relative">
                <button class="nav-icon-btn" id="notif-btn" aria-label="اعلان‌ها">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    <span class="nav-badge" id="notif-badge">0</span>
                </button>
                <div class="notification-dropdown" id="notif-dropdown">
                    <div class="notif-header">اعلان‌ها</div>
                    <div id="notif-list">
                        <div class="notif-empty">اعلان جدیدی وجود ندارد</div>
                    </div>
                </div>
            </div>
            <a class="nav-icon-btn" href="chat.html" aria-label="پیام‌ها">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span class="nav-badge" id="msg-badge">0</span>
            </a>
            <div class="user-avatar" id="user-avatar"></div>
            <span id="nav-username"></span>
            <button class="btn-logout" id="btn-logout" aria-label="خروج" title="خروج"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
        </div>
    </nav>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo-text">ایلرن</span>
        </div>
        <ul class="sidebar-nav">
            <li>
                <a href="dashboard.html">
                    <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
                    <span>درس‌های من</span>
                </a>
            </li>
            <li class="active">
                <a href="meetings.html">
                    <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></span>
                    <span>جلسات من</span>
                </a>
            </li>
            <li>
                <a href="chat.html">
                    <span class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
                    <span>پیام‌ها</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-term-box">
            <div class="term-title" id="term-name">—</div>
            <div class="term-row"><span>شروع ترم:</span><span id="term-start">—</span></div>
            <div class="term-row"><span>پایان ترم:</span><span id="term-end">—</span></div>
            <div class="term-row"><span>شروع ثبت‌نام:</span><span id="reg-start">—</span></div>
            <div class="term-row"><span>پایان ثبت‌نام:</span><span id="reg-end">—</span></div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <ul class="breadcrumb">
            <li><a href="dashboard.html">خانه</a></li>
            <li class="current">جلسات من</li>
        </ul>

        <div class="section-header">
            <h1 class="section-title">جلسات من</h1>
            <span class="count-badge" id="meetings-count">0</span>
        </div>

        <!-- Stats Cards -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-card-icon total"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></div>
                <div class="stat-card-info">
                    <span class="stat-card-value" id="stat-total">—</span>
                    <span class="stat-card-label">کل جلسات</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon present"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
                <div class="stat-card-info">
                    <span class="stat-card-value" id="stat-present">—</span>
                    <span class="stat-card-label">حاضر</span>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-card-icon absent"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
                <div class="stat-card-info">
                    <span class="stat-card-value" id="stat-absent">—</span>
                    <span class="stat-card-label">غایب</span>
                </div>
            </div>
        </div>

        <!-- Meetings Table -->
        <div class="meetings-table-wrapper">
            <table class="meetings-table" id="meetings-list">
                <thead>
                    <tr>
                        <th>ردیف</th>
                        <th>نام درس</th>
                        <th>شماره جلسه</th>
                        <th>وضعیت حضور</th>
                        <th>عملیات</th>
                    </tr>
                </thead>
                <tbody id="meetings-tbody">
                    <!-- Skeleton loading rows -->
                    <tr class="skeleton-row"><td colspan="5"><div class="skeleton-bar" style="width:100%"></div></td></tr>
                    <tr class="skeleton-row"><td colspan="5"><div class="skeleton-bar" style="width:90%"></div></td></tr>
                    <tr class="skeleton-row"><td colspan="5"><div class="skeleton-bar" style="width:95%"></div></td></tr>
                </tbody>
            </table>
            <div class="pagination-wrapper" id="pagination-wrapper"></div>
        </div>
    </main>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/mock.js"></script>
    <script src="js/auth.js"></script>
    <script>
    (function () {
        // ---- Auth & Init ----
        checkAuth();

        apiSetTime().catch(function (err) {
            console.warn('Time sync failed:', err);
        });

        loadNotifications();
        loadMeetings();

        window.addEventListener('load', function () {
            hideLoading();
        });

        // ---- State ----
        var allMeetings = [];
        var currentPage = 1;
        var pageSize = 10;

        // ---- Load Meetings ----
        function loadMeetings() {
            showLoading();

            apiGetMeetingList()
                .then(function (data) {
                    var meetings = [];
                    try {
                        if (typeof data === 'string') {
                            var parsed = JSON.parse(data);
                            meetings = parsed.aaData || parsed;
                        } else if (data && data.aaData) {
                            meetings = data.aaData;
                        } else if (Array.isArray(data)) {
                            meetings = data;
                        } else {
                            meetings = [];
                        }
                    } catch (e) {
                        meetings = [];
                    }
                    if (!Array.isArray(meetings)) meetings = [];
                    allMeetings = meetings;
                    updateStats(meetings);
                    currentPage = 1;
                    renderMeetings();
                })
                .catch(function (err) {
                    console.error('Failed to load meetings:', err);
                    document.getElementById('meetings-tbody').innerHTML =
                        '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><p>خطا در بارگذاری جلسات</p></div></td></tr>';
                    document.getElementById('pagination-wrapper').innerHTML = '';
                })
                .finally(function () {
                    hideLoading();
                });
        }


        // ---- Stats ----
        function updateStats(meetings) {
            var total = meetings.length;
            var present = 0;
            var absent = 0;

            meetings.forEach(function (m) {
                var desc = (m.PresentDesc || '').trim();
                if (desc.indexOf('حاضر') !== -1 || desc === '1') {
                    present++;
                } else if (desc.indexOf('غایب') !== -1 || desc === '0') {
                    absent++;
                }
            });

            document.getElementById('stat-total').textContent = total;
            document.getElementById('stat-present').textContent = present;
            document.getElementById('stat-absent').textContent = absent;
            document.getElementById('meetings-count').textContent = total;
        }

        // ---- Render Table ----
        function renderMeetings() {
            var tbody = document.getElementById('meetings-tbody');
            var totalPages = Math.ceil(allMeetings.length / pageSize) || 1;

            if (currentPage > totalPages) currentPage = totalPages;

            var start = (currentPage - 1) * pageSize;
            var pageMeetings = allMeetings.slice(start, start + pageSize);

            if (allMeetings.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg></div><p>جلسه‌ای یافت نشد</p></div></td></tr>';
                document.getElementById('pagination-wrapper').innerHTML = '';
                return;
            }

            var html = '';
            pageMeetings.forEach(function (m, i) {
                var rowNum = start + i + 1;
                var className = escapeHtml(m.classname || '—');
                var meetingNum = escapeHtml(m.MeetingNumber || '—');
                var presentDesc = (m.PresentDesc || '').trim();
                var urlPath = m.UrlPath || '';
                var scoId = m.ScoId || '';
                var session = localStorage.getItem('SessionInfo') || '';

                // Determine status
                var isPresent = presentDesc.indexOf('حاضر') !== -1 || presentDesc === '1';
                var isAbsent = presentDesc.indexOf('غایب') !== -1 || presentDesc === '0';
                var statusHtml;
                if (isPresent) {
                    statusHtml = '<span class="status-badge present"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> حاضر</span>';
                } else if (isAbsent) {
                    statusHtml = '<span class="status-badge absent"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> غایب</span>';
                } else {
                    statusHtml = '<span class="status-badge">' + escapeHtml(presentDesc || '—') + '</span>';
                }

                // Actions
                var actionsHtml = '<div class="actions-cell">';
                if (urlPath && /^https?:\/\//i.test(urlPath)) {
                    actionsHtml += '<a class="btn-join" href="' + escapeHtml(urlPath) + '?session=' + encodeURIComponent(session) + '" target="_blank" rel="noopener"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg> ورود</a>';
                }
                if (scoId) {
                    actionsHtml += '<a class="btn-details" href="class-details.html?id=' + encodeURIComponent(scoId) + '">جزییات</a>';
                }
                if (!urlPath && !scoId) {
                    actionsHtml += '<span style="color:var(--text-muted);font-size:var(--font-size-xs)">—</span>';
                }
                actionsHtml += '</div>';

                html += '<tr>';
                html += '<td data-label="ردیف">' + rowNum + '</td>';
                html += '<td data-label="نام درس">' + className + '</td>';
                html += '<td data-label="شماره جلسه">' + meetingNum + '</td>';
                html += '<td data-label="وضعیت حضور">' + statusHtml + '</td>';
                html += '<td data-label="عملیات">' + actionsHtml + '</td>';
                html += '</tr>';
            });

            tbody.innerHTML = html;
            renderPagination(totalPages);
        }

        // ---- Pagination ----
        function renderPagination(totalPages) {
            var wrapper = document.getElementById('pagination-wrapper');
            if (totalPages <= 1) {
                wrapper.innerHTML = '';
                return;
            }

            var html = '';
            html += '<button class="pagination-btn" data-page="prev" ' + (currentPage === 1 ? 'disabled' : '') + '>‹</button>';

            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, currentPage + 2);

            if (startPage > 1) {
                html += '<button class="pagination-btn" data-page="1">1</button>';
                if (startPage > 2) html += '<span style="padding:0 4px;color:var(--text-muted)">…</span>';
            }

            for (var p = startPage; p <= endPage; p++) {
                html += '<button class="pagination-btn' + (p === currentPage ? ' active' : '') + '" data-page="' + p + '">' + p + '</button>';
            }

            if (endPage < totalPages) {
                if (endPage < totalPages - 1) html += '<span style="padding:0 4px;color:var(--text-muted)">…</span>';
                html += '<button class="pagination-btn" data-page="' + totalPages + '">' + totalPages + '</button>';
            }

            html += '<button class="pagination-btn" data-page="next" ' + (currentPage === totalPages ? 'disabled' : '') + '>›</button>';

            wrapper.innerHTML = html;

            wrapper.querySelectorAll('.pagination-btn').forEach(function (btn) {
                btn.addEventListener('click', function () {
                    var page = this.getAttribute('data-page');
                    if (page === 'prev') {
                        if (currentPage > 1) currentPage--;
                    } else if (page === 'next') {
                        if (currentPage < totalPages) currentPage++;
                    } else {
                        currentPage = parseInt(page, 10);
                    }
                    renderMeetings();
                    document.querySelector('.meetings-table-wrapper').scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
            });
        }

        // ---- Notifications ----
        function loadNotifications() {
            apiGetNotifications()
                .then(function (data) {
                    if (!data) return;

                    var notifications = [];
                    try {
                        notifications = typeof data.Item1 === 'string' ? JSON.parse(data.Item1) : (data.Item1 || []);
                    } catch (e) { notifications = []; }
                    if (!Array.isArray(notifications)) notifications = [];

                    var notifCount = parseInt(data.Item2, 10) || 0;

                    var badge = document.getElementById('notif-badge');
                    if (notifCount > 0) {
                        badge.textContent = notifCount;
                        badge.classList.add('visible');
                    }

                    var listEl = document.getElementById('notif-list');
                    if (notifications.length === 0) {
                        listEl.innerHTML = '<div class="notif-empty">اعلان جدیدی وجود ندارد</div>';
                    } else {
                        var nhtml = '';
                        notifications.forEach(function (n) {
                            nhtml += '<div class="notif-item">' + escapeHtml(n.title || n.text || String(n)) + '</div>';
                        });
                        listEl.innerHTML = nhtml;
                    }

                    var termInfo = null;
                    try {
                        termInfo = typeof data.Item3 === 'string' ? JSON.parse(data.Item3) : data.Item3;
                    } catch (e) { termInfo = null; }

                    if (termInfo) {
                        var tn = document.getElementById('term-name');
                        var ts = document.getElementById('term-start');
                        var te = document.getElementById('term-end');
                        var rs = document.getElementById('reg-start');
                        var re = document.getElementById('reg-end');
                        if (tn) tn.textContent = termInfo.TermName || '—';
                        if (ts) ts.textContent = pdate(termInfo.TermStart) || '—';
                        if (te) te.textContent = pdate(termInfo.TermEnd) || '—';
                        if (rs) rs.textContent = pdate(termInfo.reregsdate) || '—';
                        if (re) re.textContent = pdate(termInfo.reregedate) || '—';
                    }

                    var username = data.Item4 || getUserName();
                    if (username) {
                        var unEl = document.getElementById('nav-username');
                        if (unEl) unEl.textContent = username;
                        localStorage.setItem('username', username);
                        var avEl = document.getElementById('user-avatar');
                        if (avEl) avEl.textContent = username.charAt(0).toUpperCase();
                    }
                })
                .catch(function (err) {
                    console.warn('Failed to load notifications:', err);
                    var storedName = getUserName();
                    if (storedName) {
                        var unEl = document.getElementById('nav-username');
                        if (unEl) unEl.textContent = storedName;
                        var avEl = document.getElementById('user-avatar');
                        if (avEl) avEl.textContent = storedName.charAt(0).toUpperCase();
                    }
                });
        }

        // ---- Notification Dropdown Toggle ----
        var notifBtn = document.getElementById('notif-btn');
        var notifDropdown = document.getElementById('notif-dropdown');

        notifBtn.addEventListener('click', function (e) {
            e.stopPropagation();
            notifDropdown.classList.toggle('show');
        });

        document.addEventListener('click', function (e) {
            if (!notifDropdown.contains(e.target) && e.target !== notifBtn) {
                notifDropdown.classList.remove('show');
            }
        });

        // ---- Sidebar Toggle ----
        var hamburger = document.getElementById('hamburger-btn');
        var sidebar = document.getElementById('sidebar');
        var overlay = document.getElementById('sidebar-overlay');

        hamburger.addEventListener('click', function () {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        });

        overlay.addEventListener('click', function () {
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        });

        // ---- Logout ----
        document.getElementById('btn-logout').addEventListener('click', function (e) {
            e.preventDefault();
            apiLogout()
                .then(function () { redirectToLogin(); })
                .catch(function () { redirectToLogin(); });
        });
    })();
    </script>
</body>
</html>
